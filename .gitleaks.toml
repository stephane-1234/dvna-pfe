title = "DVNA-PFE Gitleaks Config"

[[rules]]
id          = "jwt-secret-hardcoded"
description = "Cle JWT hardcodee dans le code"
regex       = '''(?i)(jwt_secret|JWT_SECRET)\s*=\s*["'][^"']{8,}["']'''
severity    = "CRITICAL"
tags        = ["jwt", "secret"]

[[rules]]
id          = "api-key-hardcoded"
description = "Cle API hardcodee dans le code"
regex       = '''(?i)(api_key|ADMIN_API_KEY)\s*=\s*["']sk-[a-zA-Z0-9\-]{10,}["']'''
severity    = "HIGH"
tags        = ["api-key"]

[allowlist]
paths = [
  '''.gitleaks.toml''',
  '''node_modules''',
  '''gitleaks.exe'''
]